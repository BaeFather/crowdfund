<script>
function get_auto_passble_money(s_type) {
	
	$.ajax({
		url: 'ajax_auto_inv_money.php',
		type: 'POST',
		data: {s_type:s_type},
		dataType: "json",
		success: function(res , textStatus, jqXHR) {
			console.log(res);
			//console.log(textStatus);
			//console.log(jqXHR);
			//alert(res.total_amount);
			$("#hellopay_amt").text(res["total_amount"]);
		},
		error: function(e) { alert("네트워크 오류 입니다. 잠시 후 다시 요청하십시요."); return; }
	});
}
</script>
