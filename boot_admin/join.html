    <script>

        $(document).ready(function(){
            $("#btnSubmit").on("click", function() {
                var fd = $("#joinForm").serializeArray();
                MsgBox.Confirm("신청 하시겠습니까?", function() {fncCreate(fd);});
            });

            function fncCreate(formData) {
                $.ajax({
                    url: "\/CC\/Login\/Join",
                    method: "POST",
                    data: formData,
                    dataType: "JSON",
                    success: function(response){
                        if ( response && response.status == 'SUCCESS' ){
                            MsgBox.Alert("suc", "신청 완료되었습니다.", function() {location.href = "\/CC\/Login";});
                        }else if( response && response.status == 'FAILED' ){
                            MsgBox.Alert("error", response.message);
                        }
                        else {
                            MsgBox.Alert("error", '입력항목 에러 입니다.');
                            markingErrorField(response);
                        }
                    },
                    error : function(jqXHR, exception) {
                        if (jqXHR.status === 0) {
                            MsgBox.Alert("error", 'Not connect.\n Verify Network.');
                        } else if (jqXHR.status == 404) {
                            MsgBox.Alert("error", 'Requested page not found. [404]');
                        } else if (jqXHR.status == 500) {
                            MsgBox.Alert("error", 'Internal Server Error [500].');
                        } else if (exception === 'parsererror') {
                            MsgBox.Alert("error", 'Requested JSON parse failed.');
                        } else if (exception === 'timeout') {
                            MsgBox.Alert("error", 'Time out error.');
                        } else if (exception === 'abort') {
                            MsgBox.Alert("error", 'Ajax request aborted.');
                        } else {
                            MsgBox.Alert("error", 'Uncaught Error.\n' + jqXHR.responseText);
                        }
                    }
                })
            }

            var markingErrorField = function (response) {
                const errorFields = response.data;
                $('.invalid-feedback').text('');
                $('.form-control').removeClass('is-invalid');

                if(errorFields.length > 0) {
                    var $field, $invalid, error;
                    for(var i=0, length = errorFields.length; i<length;i++){
                        error = errorFields[i];
                        $field = $('#'+error['field']);
                        $invalid = $('#'+error['field']+'-invalid');
                        if($field && $field.length > 0){
                            $field.addClass('is-invalid');
                            $invalid.text($invalid.text() + '['+error.defaultMessage + ']');
                        }
                    }
                }
                else {
                    MsgBox.Alert("error", response.message);
                }
            };
        });
		
    </script>


	<script>
		
	function idInvalTextView(id, color, msg){
    $('#' + id).addClass('is-invalid');
    $('#' + id + '-invalid').css("color", color);
    $('#' + id + '-invalid').text(msg);
	}

		
	// 아이디 빈값 체크
	id_check = function(){
		var adminId = $("#adminId").val();
		if(!adminId) {
			idInvalTextView('adminId', 'red', '[아이디를 입력해주세요.]');
				return false;
		}
	}
	

	// 이름 빈값 체크
	name_check = function(){
		var adminName = $("#adminName").val();
		if(!adminName) {
			idInvalTextView('adminName', 'red', '[이름을 입력해주세요.]');
				return false;
		}
	}


	// 휴대폰 체크

	hp_check = function() {
		var hp = /^(?:(010\d{4})|(01[1|6|7|8|9]\d{3,4}))(\d{4})$/;
		var str = $('#hp').val();

		if(str.length > 1) {
			if(hp.test(str) == false) {
				idInvalTextView('hp', 'red', '[올바른 휴대폰 번호를 입력해 주세요.]');
			}
			else {
				$("#hp").addClass('is-invalid');
				$('#hp-invalid').empty();
			}
		}
		else {
			idInvalTextView('hp', 'red', '[휴대폰 번호를 입력해 주세요.]');
		}
	}



	// 이메일 체크
	email_check = function() {
		var re = /([\w-\.]+)@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.)|(([\w-]+\.)+))([a-zA-Z]{2,4}|[0-9]{1,3})(\]?)$/;
		var str = $('#email').val();

		if(str.length > 1) {
			if(re.test(str) == false) {
				idInvalTextView('email', 'red', '[올바른 이메일 주소를 입력해 주세요.]');
			}
			else {
				$("#email").addClass('is-invalid');
				$('#email-invalid').empty();
			}
		}
		else {
			idInvalTextView('email', 'red', '[이메일 주소를 입력해 주세요.]');
		}
	}


	// 빈값일 때, 하단 가입버튼 클릭시 안내 문구
	
	$("#btnSubmit").on('click', function(){
		var adminId = $("#adminId").val();
        var adminName = $("#adminName").val();
        var hp = $("#hp").val();
        var email = $("#email").val();
		
		if(!adminId) {
		   idInvalTextView('adminId', 'red', '[아이디는 필수정보입니다.]');
		}
		
		if(!adminName) {
		   idInvalTextView('adminName', 'red', '[이름은 필수정보입니다.]');
		}
		
		if(!hp) {
		   idInvalTextView('hp', 'red', '[휴대폰 번호는 필수정보입니다.]');
		}
		
		if(!email) {
		   idInvalTextView('email', 'red', '[이메일은 필수정보입니다.]');
		}

	});


		
	</script>
