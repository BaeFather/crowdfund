<!DOCTYPE html>
<html lang="en">

    <head>
		<meta charset="utf-8" />
		<title>비밀번호찾기</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta content="A fully featured admin theme which can be used to build CRM, CMS, etc." name="description" />
		<meta content="Coderthemes" name="author" />
		<meta name="format-detection" content="telephone=no" />
			
		<!-- jquery js -->
		<script defer src="./assets/js/vendor.min.js"></script>
		<script defer src="./assets/js/app.min.js"></script>
		
		<!-- App favicon -->
		<link rel="shortcut icon" href="./assets/images/favicon.ico">

		<!-- header, footer css -->
		<link rel="stylesheet" href="./assets/css/common/reset.css">
		
		<!-- member css -->
		<link href="./assets/css/page/member.css" rel="stylesheet" type="text/css" />

		<!-- common css -->
		<link href="./assets/css/icons.min.css" rel="stylesheet" type="text/css" />
		<link href="./assets/css/app.min.css" rel="stylesheet" type="text/css" id="light-style" />
		<link href="./assets/css/app-dark.min.css" rel="stylesheet" type="text/css" id="dark-style" />

    </head>

    <body>
		<section class="find-pw">
            <div class="container">
				<h4><img src="assets/images/logo/hello_logo_red.png" alt="헬로펀딩"></h4>
				<p>API 비밀번호찾기</p>
				<form action="#">
					<div class="form-group">
						<input class="form-control" type="text" id="" required="" placeholder="아이디">
						<div id="" class="invalid-feedback">아이디를 입력해주세요</div>
					</div>
					<div class="form-group">
						<input class="form-control" type="text" id="" required="" placeholder="사업자번호">
						<div id="" class="invalid-feedback">사업자번호를 입력해주세요</div>
					</div>
					<div class="form-group">                                     
						<div class="input-group input-group-merge">
							<input class="form-control"  type="password" id="password"  placeholder="이메일">
							<div id="" class="invalid-feedback">이메일을 입력해주세요</div>
						</div>
					</div>						
					<div class="form-group">
						<button class="btn btn-primary" type="submit">비밀번호 찾기</button>
					</div>
				</form>
                <div class="go-login">
                    <a href="login.html">로그인하기</a>
                </div> 
            </div>
		</section>
    </body>
</html>
