<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>비밀번호 변경</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta content="A fully featured admin theme which can be used to build CRM, CMS, etc." name="description" />
        <meta content="Coderthemes" name="author" />
		<meta name="format-detection" content="telephone=no" />
          
        <!-- jquery js -->
		<script defer src="./assets/js/vendor.min.js"></script>
        <script defer src="./assets/js/app.min.js"></script>
        <script defer src="./assets/js/app/header.js"></script>

		
        <!-- App favicon -->
        <link rel="shortcut icon" href="./assets/images/favicon.ico">

		<!-- header, footer, common css -->
		<link rel="stylesheet" href="./assets/css/common/header.css">
		<link rel="stylesheet" href="./assets/css/common/footer.css">
		<link rel="stylesheet" href="./assets/css/common/common.css">

		<!-- contents css -->
		<link href="./assets/css/page/member.css" rel="stylesheet" type="text/css">


		<!-- common css -->
		<link href="./assets/css/icons.min.css" rel="stylesheet" type="text/css" />
		<link href="./assets/css/app.min.css" rel="stylesheet" type="text/css" id="light-style" />
		<link href="./assets/css/app-dark.min.css" rel="stylesheet" type="text/css" id="dark-style" />
	
    </head>

    <body>
		<!-- password change start -->
		<section class="pass-change">
            <div class="container">
                <div class="row justify-content-center">
                     <div class="card">
                     	<div class="card-body">          
                        	<h4>비밀번호 변경</h4>
							<p>개인정보 보호를 위해 비밀번호를 변경해주세요.</p>
                            <div class="tab-pane">
                                <form action="#">
                                    <div class="form-group">
										<input class="form-control" type="password" id="now-pass"  placeholder="현재 비밀번호">
									</div>
									<div class="form-group">
										<input class="form-control" type="password" id="new-pass"  placeholder="새 비밀번호">
									</div>
									<div class="form-group">
										<input class="form-control" type="password" id="check-pass"  placeholder="새 비밀번호 확인">
									</div>
									<p class="notice"><span>*</span> 숫자, 영문, 특수문자를 조합하여 8자리 이상 입력해주세요.</p>						
                                </form>	
                            </div>
								<div class="btn-wrap">
                                	<button class="btn btn-primary"> 비밀번호 변경하기</button>
									<button class="btn btn-delay">90일 후 변경</button>
									<p>헬로펀딩은 3개월 이상 비밀번호를 변경하지 않고 동일한 비밀번호를 사용 중인 경우,
									로그인 시 비밀번호 변경 안내를 해드리고 있습니다.</p>
                                </div>
                        </div> <!-- end card-body -->
                    </div><!-- end card -->
                </div> <!-- end row -->
            </div><!-- end container -->
		</section>


    <!-- bundle -->
    <script src="assets/js/vendor.min.js"></script>
    <script src="assets/js/app.min.js"></script>


    </body>
</html>
