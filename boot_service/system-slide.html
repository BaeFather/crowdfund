<!DOCTYPE html>
<html lang="en"><head>
        <meta charset="utf-8" />
        <title>헬로펀딩</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta content="A fully featured admin theme which can be used to build CRM, CMS, etc." name="description" />
        <meta content="Coderthemes" name="author" />
		<meta name="format-detection" content="telephone=no" />
          
        <!-- jquery js -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<script defer src="./assets/js/vendor.min.js"></script>
        <script defer src="./assets/js/app.min.js"></script>
        <script defer src="./assets/js/app/header.js"></script>

		
        <!-- App favicon -->
        <link rel="shortcut icon" href="./assets/images/favicon.ico">

		<!-- header, footer, common css -->
		<link rel="stylesheet" href="./assets/css/common/header.css">
		<link rel="stylesheet" href="./assets/css/common/footer.css">
		<link rel="stylesheet" href="./assets/css/common/common.css">

		<!-- contents css -->
		<link href="./assets/css/page/system.css" rel="stylesheet" type="text/css">


		<!-- common css -->
		<link href="./assets/css/icons.min.css" rel="stylesheet" type="text/css" />
		<link href="./assets/css/app.min.css" rel="stylesheet" type="text/css" id="light-style" />
		<link href="./assets/css/app-dark.min.css" rel="stylesheet" type="text/css" id="dark-style" />


		<!-- Link Swiper's CSS -->
   		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css"/>
	
		
    </head>

    <body>

    	<div class="modal fade system-slide-modal" id="SystemModal" role="dialog">
        	<div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header"></div>
                    <div class="modal-body">
				    	<div class="swiper mySwiper">
                        	<div class="swiper-wrapper">
								<div class="swiper-slide">
									<div class="txt-bn">
										<p class="img"><img src="assets/images/img/system-m.png" alt="시스템 팝업"></p> 
										<h3>시스템 점검 안내</h3>
										<p>보다 안정적인 서비스를 제공하기 위해 아래와 같이 시스템 점검이 진행됩니다.<br>
										   시스템 점검으로 인해 서비스 이용에 불편을 드리는 점 양해 부탁드립니다.<br><br>
										   내용 : 입출금 및 기타 서비스 이용 불가</p>
										<div class="box">
											<p>일시 : 22.11.17(목) 22:00 - 22.11.18(금) 01:30</p>
										</div>
									</div>
								</div>	
								<div class="swiper-slide">
									<div class="img-bn">
										<img src="assets/images/img/test.jpg" alt="헬로펀딩 팝업">
									</div>
								</div>	
                            </div>
                            <div class="swiper-button-next"></div>
                            <div class="swiper-button-prev"></div>
                            <div class="swiper-pagination"></div>
                        </div>

						
                    </div>
                    <div class="modal-footer">
						<p>오늘 하루 열지 않음</p>
						<p data-dismiss="modal">닫기</p>
					</div>	
                </div>
            </div>
       </div>

		<!-- Swiper JS -->
    	<script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>	
		
		
	    <!-- Initialize Swiper -->
		<script>
		  var swiper = new Swiper(".mySwiper", {
			spaceBetween: 30,
			centeredSlides: true,
			loop:true, 
			autoplay: {
			  delay: 2500,
			  disableOnInteraction: false,
			},
			pagination: {
			  el: ".swiper-pagination",
			  clickable: true,
			},
			navigation: {
			  nextEl: ".swiper-button-next",
			  prevEl: ".swiper-button-prev",
			},
		  });
    	</script>
		
    <!--modal 상시 오픈-->	
    <script>
      $(document).ready(function(){
        $("#SystemModal").modal("show");
      });
    </script>
		


    </body>
</html>
