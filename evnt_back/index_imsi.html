<script>
function get_stat(ymd) {
	$.ajax({
		url : 'ajax_get_apply_mem.php',
		data : { 'srch_ymd' : ymd },
		type : 'post',
		dataType : 'json',
		success : function(data) {
			console.log(data);
			$("#mem_stat tr").remove();
			if (data["list"].length) {
				dply(data);
			}
		},
		error : function (jqXHR, textStatus, errorThrown) {
			alert(jqXHR+"\n"+textStatus+"\n"+errorThrown);
		}
	});
}
function dply(data) {
	var tr_html = "";
	for (var i=0 ; i<data["list"].length ; i++) {
		if (i==0 || i+1%3 == 1) tr_html += "<tr>";
		tr_html += "<td>"+ data["list"][i]["mb_id"].substring(0,4) +"*** "+ number_format(data["list"][i]["answer"]) +"만원</td>";
		if (i+1%3 == 0) tr_html += "</tr>";
	}

	if (i%3==1) tr_html +="<td>&nbsp;</td><td>&nbsp;</td></tr>";
	if (i%3==2) tr_html +="<td>&nbsp;</td></tr>";
	$("#mem_stat").append(tr_html);
}
</script>
