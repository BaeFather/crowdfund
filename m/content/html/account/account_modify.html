<!doctype html>
<html lang="ko">
    <head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
		<meta name="format-detection" content="telephone=no">
        <meta charset="utf-8" />
        <title>환급계좌 변경</title>
        <link type="text/css" rel="stylesheet" href="css/sub.css" />
        <link type="text/css" rel="stylesheet" href="css/account.css" />
        <link rel="stylesheet" type="text/css" href="css/component.css" /> <!-- modal(popup) css -->
        
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    </head>
    
    <body>
        <!-- ### PageTitle Start -->
        <div id="PageTitle">
            <h2>환급계좌 변경</h2>
            <div class="close_btn">
                <a href="#"><img src="img/close_icon.png" /></a>
            </div>
        </div>
        <!-- ### PageTitle End -->

        <!-- ### AccountModify Start -->
        <div id="AccountModify">
            <div class="acc_mody_title">
                <h2>새로운 환급계좌를 입력해주세요.</h2>
            </div>
            <form>
                <ul>
                    <li>
                        <span>은행</span>
                        <select>
                            <option>은행을 선택해주세요</option>
                            <option>국민은행</option>
                            <option>신한은행</option>
                        </select>
                    </li>
                    <li>
                        <span>계좌</span>
                        <input type="text" placeholder="-제외 후 입력해주세요" />
                        <button type="button" class="md-trigger" data-modal="modal-3">인증</button>
                    </li>
                    <li>
                        <span>이름</span>
                        <p>&nbsp;&nbsp;이상규</p>
                    </li>
                </ul>
            </form>
        </div>
        <!-- ### AccountModify End -->

        <!-- ### BottomBtn Start -->
        <div id="BottomBtn">
            <button class="md-trigger" data-modal="ConfirmPopup">확인</button>
        </div>
        <!-- ### BottomBtn End -->

        <!-- ### alertPopup Start-->
        <div class="md-modal md-effect-3" id="modal-3">
			<div class="md-content" id="alertPopup">
                <div class="content">
                    <P>계좌가 정상적으로 인증되었습니다.</P>
                </div>
                <div class="md-close txt_close_btn">확인</div>
			</div>
		</div>
        <!-- ### alertPopup end-->

        <!-- ### ConfirmPopup Start-->
        <div class="md-modal md-effect-3" id="ConfirmPopup">
			<div class="md-content">
                <h2>
                    아래 계좌로 <span>변경</span>하시겠습니까?
                </h2>
                <p>
                    <span>은행</span>
                    국민은행
                </p>
                <p>
                    <span>계좌번호</span>
                    123-12312-1231
                </p>
                <p>
                    <span>예금주</span>
                    이상규
                </p>
                <div class="btn">
                    <input type="button" value="아니요" class="md-close" />
                    <input type="button" value="예" />
                </div>
			</div>
		</div>
        <div class="md-overlay"></div><!-- the overlay element -->
        <!-- ### ConfirmPopup end-->

        <!-- modal(popup) script -->
        <script src="js/classie.js"></script>
        <script src="js/modalEffects.js"></script>
    </body>
</html>
