<!doctype html>
<html lang="ko">
    <head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
        <meta charset="utf-8" />
        <title>예금출금</title>
        <link type="text/css" rel="stylesheet" href="css/sub.css" />
        <link type="text/css" rel="stylesheet" href="css/deposit.css" />
        <link rel="stylesheet" type="text/css" href="css/component.css" /> <!-- modal(popup) css -->
        
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    </head>
    
    <body>
        <!-- ### PageTitle Start -->
        <div id="PageTitle">
            <h2>예치금 출금</h2>
            <div class="close_btn">
                <a href="#"><img src="img/close_icon.png" /></a>
            </div>
        </div>
        <!-- ### PageTitle End -->

        <!-- ### DepositWthdr Start -->
        <div id="DepositWthdr">
            <div class="wthdr_title">
                <h2>출금하실 금액을 입력해주세요</h2>
                <p>출금 가능 금액 <span>3,000,000원</span></p>
            </div>
            <form>
                <div class="form_wrap">
                    <input type="text" name="" id="" placeholder="금액을 입력해주세요">
                    <button><img src="img/reset_icon.png" /></button>
                </div>
            </form>
            <div class="wthdr_info">
                <p><span>계좌번호</span>카카오뱅크 123456789</p>
                <p><span>예금주</span>씨엘에스코리아주식회사</p>
            </div>
        </div>
        <!-- ### DepositWthdr End -->

        <!-- ### BottomBtn Start -->
        <div id="BottomBtn">
            <button class="md-trigger" data-modal="ConfirmPopup">출금 신청</button>
        </div>
        <!-- ### BottomBtn End -->

        <!-- ### ConfirmPopup Start-->
        <div class="md-modal md-effect-3" id="ConfirmPopup">
			<div class="md-content">
                <h2>
                    <span>씨엘에스코리아 주식회사</span>님에게<br />
                    이체하시겠습니까?
                </h2>
                <p>
                    <span>받는계좌</span>
                    카카오뱅크 123456789
                </p>
                <p>
                    <span>보낼금액</span>
                    1,465,000원
                </p>
                <div class="btn">
                    <input type="button" value="아니요" class="md-close" />
                    <input type="button" value="예" />
                </div>
			</div>
		</div>
        <div class="md-overlay"></div><!-- the overlay element -->
        <!-- ### ConfirmPopup end-->

        <!-- modal(popup) script -->
        <script src="js/classie.js"></script>
        <script src="js/modalEffects.js"></script>
    </body>
</html>
