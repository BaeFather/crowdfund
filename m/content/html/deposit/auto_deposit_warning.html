<!doctype html>
<html lang="ko">
    <head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
        <meta charset="utf-8" />
        <title>투자위험고지</title>
        <link type="text/css" rel="stylesheet" href="css/sub.css" />
        <link type="text/css" rel="stylesheet" href="css/auto.css" />
        
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    </head>
    
    <body>
        <!-- ### PageTitle Start -->
        <div id="PageTitle">
            <h2>투자위험고지</h2>
            <div class="close_btn">
                <a href="#"><img src="img/close_icon.png" /></a>
            </div>
        </div>
        <!-- ### PageTitle End -->

        <!-- ### AutoDepositWarning Start -->
        <div id="AutoDepositWarning">
            <div class="info">
                <p>본 투자상품은 원금이 보장되지 않습니다. <br />
                    모든 투자상품은 현행 법률 상 ‘유사수신 행위의 규제에 관한 법률’에 의거하여
                    원금과 수익을 보장할 수 없습니다.<br />
                    또한 차입자가 원금의 전부 또는 일부를 상환하지 못할 경우 발생하게 되는
                    투자금 손실 등 투자위험은 투자자가 부담하게 됩니다. </p>
            </div>
            <div class="agreement">
                <p>상기 내용을 확인하였으며 그 내용에</p>
                <form>
                    <input type="text" />
                </form>
                <p>※ 빈칸에 <span>'동의함'</span> 을 입력하셔야만 자동투자가 가능합니다.</p>
            </div>
            <p class="warn">※ 자동투자 설정시 상환방식이 예치금 상환방식으로 변경됩니다.</p>
        </div>
        <!-- ### AutoDepositWarning End -->

        <!-- ### BottomBtn Start -->
        <div id="BottomBtn">
            <button class="md-trigger" data-modal="ConfirmPopup">확인</button>
        </div>
        <!-- ### BottomBtn End -->
    </body>
</html>
