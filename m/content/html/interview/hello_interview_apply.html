<!doctype html>
<html lang="ko">
    <head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
        <meta charset="utf-8" />
        <title>헬로인터뷰 신청</title>
        <link type="text/css" rel="stylesheet" href="css/sub.css" />
        <link type="text/css" rel="stylesheet" href="css/hello.css" />
        <link rel="stylesheet" type="text/css" href="css/component.css" /> <!-- modal(popup) css -->
        
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    </head>
    
    <body>
        <!-- ### PageTitle Start -->
        <div id="PageTitle">
            <h2>인터뷰 신청</h2>
            <div class="close_btn">
                <a href="#"><img src="img/close_icon.png" /></a>
            </div>
        </div>
        <!-- ### PageTitle End -->

        <!-- ### InterviewApply Start -->
        <div id="InterviewApply">
            <div class="apply_title">
                <h2>아래 정보를 확인해주세요</h2>
            </div>
            <div class="apply_info">
                <p><span>이름</span>이상규</p>
                <p><span>연락처</span>010-2222-3333</p>
            </div>
            <form>
                <div class="form_wrap">
                    <div class="agree"><input type="checkbox" />개인정보 활용 및 마케팅 활용에 동의합니다.</div>
                    <div class="agree"><input type="checkbox" />동영상 및 사진 촬영에 동의합니다.</div>
                    <p>
                        * 인터뷰 일정은 담당자를 통해 안내 드리며, 인터뷰 진행 시 소정의 상품을
                        지급해드립니다.
                    </p>
                </div>
            </form>
        </div>
        <!-- ### InterviewApply End -->

        <!-- ### BottomBtn Start -->
        <div id="BottomBtn">
            <button class="md-trigger" data-modal="modal-3">신청</button>
        </div>
        <!-- ### BottomBtn End -->

        <!-- ### alertPopup Start-->
        <div class="md-modal md-effect-3" id="modal-3">
			<div class="md-content" id="alertPopup">
                <div class="content">
                    <P>개인정보 및 마케팅 활용에 동의 해주세요.</P>
                    <!-- <p>동영상 및 사진 촬영에 동의 해주세요.</p> -->
                </div>
                <div class="md-close txt_close_btn">확인</div>
			</div>
		</div>
        <div class="md-overlay"></div><!-- the overlay element -->
        <!-- ### alertPopup end-->

        <!-- modal(popup) script -->
        <script src="js/classie.js"></script>
        <script src="js/modalEffects.js"></script>
    </body>
</html>
