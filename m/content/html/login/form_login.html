<!doctype html>
<html lang="ko">
    <head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
        <meta charset="utf-8" />
        <title>로그인</title>
        <link type="text/css" rel="stylesheet" href="css/sub.css" />
        <link type="text/css" rel="stylesheet" href="css/form.css" />
        
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    </head>
    
    <body>
        <!-- ### PageTitle Start -->
        <div id="PageTitle">
            <h2>로그인</h2>
            <div class="close_btn">
                <a href="#"><img src="img/close_icon.png" /></a>
            </div>
        </div>
        <!-- ### PageTitle End -->

        <!-- ### Login Start -->
        <div id="Login">
            <div class="title">
                <img src="img/hello_punding_logo.png" />
                <h2>안녕하세요. <br />
                    헬로펀딩입니다.</h2>
                <p>회원 서비스 이용을 위해 로그인해주세요.</p>
            </div>
            <form>
                <div class="form_wrap">
                    <input type="text" placeholder="아이디" />
                    <input type="password" placeholder="비밀번호" />
                    <input type="checkbox" id="auto_login" /><label for="auto_login">자동 로그인</label>
                </div>
            </form>
            <ul class="login_shortcut">
                <li><a href="#">아이디 찾기</a></li>
                <li><a href="#">비밀번호 찾기</a></li>
                <li><a href="#">회원가입</a></li>
            </ul>
        </div>
        <!-- ### Login End -->

        <!-- ### BottomBtn Start -->
        <div id="BottomBtn">
            <button>로그인</button>
        </div>
        <!-- ### BottomBtn End -->
    </body>
</html>
