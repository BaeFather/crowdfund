<!doctype html>
<html lang="ko">
    <head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
        <meta charset="utf-8" />
        <title>가상계좌발급</title>
        <link type="text/css" rel="stylesheet" href="css/sub.css" />
        <link type="text/css" rel="stylesheet" href="css/virtual.css" />
        
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    </head>
    
    <body>
        <!-- ### VirtualAcc01 Start -->
        <div id="VirtualAcc01">
            <div class="virtual_step">
                <div class="step step_on">1</div>
                <div class="border"></div>
                <div class="step">2</div>
                <div class="border"></div>
                <div class="step">3</div>
            </div>
            <div class="virtual_title">
                <h2>
                    설레는 투자의 첫걸음<br />
                    개인 <span>가상계좌를 발급</span> 받으세요
                </h2>
                <p>
                    제 3자에 의한 예치금 신탁관리 안내<br />
                    신한은행에서 발급 및 관리하는 가상계좌를 통하여<br />
                    안전한 예치금 신탁관리를 받으실 수 있습니다. 
                </p>
            </div>
            <div class="virtual_content">
                <img src="img/virtual_img.png" />
            </div>
        </div>
        <!-- ### VirtualAcc01 End -->

        <!-- ### BottomBtn Start -->
        <div id="BottomBtn">
            <button type="button" class="cancel">취소</button>
            <button type="button">확인</button>
        </div>
        <!-- ### BottomBtn End -->
    </body>
</html>
