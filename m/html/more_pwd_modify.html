<!doctype html>
<html lang="ko">
    <head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
        <meta charset="utf-8" />
        <title>비밀번호 변경</title>
        <link type="text/css" rel="stylesheet" href="css/sub.css" />
        <link type="text/css" rel="stylesheet" href="css/more.css" />
        <link rel="stylesheet" type="text/css" href="css/component.css" /> <!-- modal(popup) css -->
        
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    </head>
    
    <body>
        <!-- ### PageTitle Start -->
        <div id="PageTitle">
            <h2>비밀번호 변경</h2>
            <div class="close_btn">
                <a href="#"><img src="img/close_icon.png" /></a>
            </div>
        </div>
        <!-- ### PageTitle End -->

        <!-- ### PwdModify Start -->
        <div id="PwdModify">
            <form>
                <div class="form_wrap">
                    <h2>새로운 비밀번호를 입력해주세요</h2>
                    <div class="label_box">
                        현재 비밀번호
                    </div>
                    <div class="form_box">
                        <input type="password" placeholder="현재 비밀번호를 입력해주세요" />
                    </div>
                    <div class="label_box">
                        새로운 비밀번호 
                    </div>
                    <div class="form_box">
                        <input type="password" placeholder="새로운 비밀번호를 입력해주세요" />
                        <p class="warn">* 영문/숫자/특수문자 조합, 8-15자리까지 입력 가능합니다.</p>
                    </div>
                    <div class="label_box">
                        비밀번호 확인 
                    </div>
                    <div class="form_box">
                        <input type="password" placeholder="새로운 비밀번호를 한 번 더 입력해주세요" />
                        <p class="warn">* 비밀번호가 일치하지 않습니다.</p>
                    </div>
                </div>
            </form>
        </div>
        <!-- ### PwdModify End -->

        <!-- ### BottomBtn Start -->
        <div id="BottomBtn">
            <button type="button" class="cancel">취소</button>
            <button type="button" class="md-trigger" data-modal="modal-3">변경</button>
        </div>
        <!-- ### BottomBtn End -->

        <!-- ### alertPopup Start-->
        <div class="md-modal md-effect-3" id="modal-3">
			<div class="md-content" id="alertPopup">
                <div class="content">
                    <P>비밀번호가 변경되었습니다.</P>
                </div>
                <div class="md-close txt_close_btn">확인</div>
			</div>
		</div>
        <div class="md-overlay"></div><!-- the overlay element -->
        <!-- ### alertPopup end-->

        <!-- modal(popup) script -->
        <script src="js/classie.js"></script>
        <script src="js/modalEffects.js"></script>
    </body>
</html>
