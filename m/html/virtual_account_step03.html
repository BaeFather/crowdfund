<!doctype html>
<html lang="ko">
    <head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
        <meta charset="utf-8" />
        <title>가상계좌발급</title>
        <link type="text/css" rel="stylesheet" href="css/sub.css" />
        <link type="text/css" rel="stylesheet" href="css/virtual.css" />
        
        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    </head>
    
    <body>
        <!-- ### VirtualAcc03 Start -->
        <div id="VirtualAcc03">
            <div class="virtual_step">
                <div class="step">1</div>
                <div class="border"></div>
                <div class="step">2</div>
                <div class="border"></div>
                <div class="step step_on">3</div>
            </div>
            <div class="virtual_title">
                <h2>
                    헬로펀딩 가상계좌 발급 완료 안내
                </h2>
                <div class="p_box">
                    <span>*</span>
                    <p>헬로펀딩의 투자전용 예치금 계좌(가상계좌)입니다.</p>
                </div>
                <div class="p_box">
                    <span>*</span>
                    <p>발급 받으신 가상계좌로 예치금을 충전하신 후 투자 가능합니다.</p>
                </div>
                <div class="p_box">
                    <span>*</span>
                    <p>헬로펀딩의 예치금/투자금/상환금 일체를 신한은행이 직접
                        관리하므로 안전합니다. </p>
                </div>
            </div>
            <div class="virtual_content">
                <div class="com_box">
                    <p><span>은행명</span>신한은행</p>
                    <p><span>계좌번호</span>5234234234234</p>
                    <p><span>예금주</span>이상규(헬로펀딩)</p>
                    <!-- 사업자 발급 시 보여준다 -->
                    <p><span>사업자번호</span>5634234234</p>
                </div>
            </div>
        </div>
        <!-- ### VirtualAcc03 End -->

        <!-- ### BottomBtn Start -->
        <div id="BottomBtn">
            <button type="button">확인</button>
        </div>
        <!-- ### BottomBtn End -->
    </body>
</html>
