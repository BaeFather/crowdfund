<script>
$(document).ready(function(){
	// 인풋박스 텍스트 페이드
	$('.id-label').animate({ opacity: "1" })
		.click(function() {
			var thisFor	= $(this).attr('for');
			$('.'+thisFor).focus();
	});

	$('.p-label').animate({ opacity: "1" })
		.click(function() {
			var thisFor	= $(this).attr('for');
			$('.'+thisFor).focus();
	});

	// 아이디
	$('.mb-id').focus(function() {

		$('.id-label').animate({ opacity: "0" }, "fast");

			if($(this).val() == "mb-id")
				$(this).val() == "";

		}).blur(function() {

			if($(this).val() == "") {
				$(this).val() == "mb-id";
				$('.id-label').animate({ opacity: "1" }, "fast");
			}
	});
	//핸드폰번호
	$('.mb-phone').focus(function() {

		$('.p-label').animate({ opacity: "0" }, "fast");

			if($(this).val() == "mb-phone")
				$(this).val() == "";

		}).blur(function() {

			if($(this).val() == "") {
				$(this).val() == "mb-phone";
				$('.p-label').animate({ opacity: "1" }, "fast");
			}
	});

	$('#check').click(function() {
		$.blockUI({
			message: $('#complete'),
			css: { width:'280px',top:'30%',left:'50%',marginLeft:'-140px',border:0, cursor:'default' } });

		/*
		$.ajax({
			url: 'wait.php',
			cache: false,
			complete: function() {
				// unblock when remote call returns
				$.unblockUI();
			}
		});
		*/

	});

	$('#complete #yes, #complete .close').click(function() {
		$.unblockUI();
		return false;
	});

});
</script>
